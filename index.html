<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scriptorium — LitRPG Writing Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0c0a;--sb:#100f0d;--card:#181613;--card2:#1e1c18;
  --b:#272320;--bl:#322e28;
  --ac:#c4922a;--acg:rgba(196,146,42,0.12);--acd:rgba(196,146,42,0.38);
  --tl:#4a8a8c;--tld:rgba(74,138,140,0.2);
  --tx:#cec3b0;--txd:#7a6e60;--txb:#ede5d4;--txf:#3e3830;
  --dg:#9b4040;--dgd:rgba(155,64,64,0.12);--ok:#4a7c5a;
}
html,body,#root{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--tx);font-size:16px;line-height:1.55;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px;}
.app{display:flex;flex-direction:column;height:100vh;}
.hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sb);border-bottom:1px solid var(--b);flex-shrink:0;overflow:hidden;}
.hdr-logo{font-family:'IM Fell English',serif;font-size:18px;color:var(--ac);letter-spacing:.04em;flex-shrink:0;}
.hdr-logo span{display:none;}
.key-btn{width:32px;height:28px;background:transparent;border:1px solid;border-radius:3px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s;}
.key-btn.set{background:rgba(74,124,90,0.15);border-color:rgba(74,124,90,0.5);}
.key-btn.unset{background:var(--dgd);border-color:rgba(155,64,64,0.38);animation:pulse-key 2s ease infinite;}
@keyframes pulse-key{0%,100%{opacity:1}50%{opacity:0.6}}
.hdr-sep{width:1px;height:20px;background:var(--b);flex-shrink:0;}
.spacer{flex:1;}
.btn{font-family:'Crimson Pro',serif;font-size:13px;letter-spacing:.06em;padding:5px 12px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .14s;text-transform:uppercase;white-space:nowrap;}
.btn-a{background:var(--acg);border-color:var(--acd);color:var(--ac);}.btn-a:hover{background:rgba(196,146,42,.22);border-color:var(--ac);}
.btn-g{background:transparent;border-color:var(--b);color:var(--txd);}.btn-g:hover{border-color:var(--bl);color:var(--tx);}
.btn-d{background:var(--dgd);border-color:rgba(155,64,64,.38);color:var(--dg);}.btn-d:hover{background:rgba(155,64,64,.22);}
.btn-sm{padding:3px 9px;font-size:11px;}
.btn-t{background:var(--tld);border-color:rgba(74,138,140,.38);color:var(--tl);}.btn-t:hover{background:rgba(74,138,140,.28);}
.proj-sel{background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:15px;padding:5px 9px;border-radius:3px;outline:none;cursor:pointer;min-width:140px;max-width:210px;}
.proj-sel:focus{border-color:var(--acd);}.proj-sel option{background:var(--card);}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:52px;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:8px 0;gap:2px;align-items:center;flex-shrink:0;overflow-y:auto;}
.nav-btn{width:40px;height:40px;background:transparent;border:none;color:var(--txd);cursor:pointer;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;transition:all .12s;}
.nav-btn:hover{background:var(--card2);color:var(--tx);}.nav-btn.on{background:var(--acg);color:var(--ac);}
.nav-lbl{font-size:7.5px;font-family:'JetBrains Mono',monospace;margin-top:2px;letter-spacing:.06em;text-transform:uppercase;}
.nav-div{width:28px;height:1px;background:var(--b);margin:4px 0;flex-shrink:0;}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.sec-hdr{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sec-title{font-family:'IM Fell English',serif;font-size:23px;color:var(--txb);}
.sec-title em{color:var(--ac);font-style:normal;}
.two-panel{display:flex;flex:1;overflow:hidden;margin-top:11px;}
.list-pane{width:250px;border-right:1px solid var(--b);overflow-y:auto;padding:8px;flex-shrink:0;}
.detail-pane{flex:1;overflow-y:auto;padding:16px 20px;}
.full-pane{flex:1;overflow-y:auto;padding:16px 20px;}
.li{padding:8px 10px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .12s;margin-bottom:3px;}
.li:hover{background:var(--card);border-color:var(--b);}.li.on{background:var(--acg);border-color:var(--acd);}
.li-title{font-size:15px;color:var(--txb);}.li-sub{font-size:11px;color:var(--txd);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-top:2px;letter-spacing:.04em;}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;background:var(--card2);border:1px solid var(--b);border-radius:2px;color:var(--txd);text-transform:uppercase;letter-spacing:.07em;margin-right:4px;margin-bottom:3px;}
.tag.t{background:var(--tld);border-color:var(--tl);color:var(--tl);}.tag.a{background:var(--acg);border-color:var(--acd);color:var(--ac);}
.det-name{font-family:'IM Fell English',serif;font-size:25px;color:var(--txb);}
.det-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:12px;}
.det-body{font-size:15px;color:var(--tx);line-height:1.75;white-space:pre-wrap;}
hr.div{border:none;border-top:1px solid var(--b);margin:12px 0;}
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.stat-c{background:var(--card2);border:1px solid var(--b);border-radius:4px;padding:7px 9px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.07em;}
.stat-v{font-size:19px;font-family:'IM Fell English',serif;color:var(--txb);}
.beat{font-size:14px;color:var(--txd);padding:3px 0 3px 13px;position:relative;line-height:1.5;}
.beat::before{content:'◆';position:absolute;left:0;color:var(--acd);font-size:8px;top:6px;}
.fg{margin-bottom:12px;}.fl{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;}
.fi,.fsel,.fta{width:100%;background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:15px;padding:6px 10px;border-radius:4px;outline:none;transition:border-color .14s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--acd);}.fta{resize:vertical;min-height:100px;line-height:1.65;}.fsel option{background:var(--card);}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}.f-full{grid-column:1/-1;}
.i-row{display:flex;gap:6px;align-items:flex-end;}.i-row .fi{flex:1;}
.beat-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.beat-fi{flex:1;background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:14px;padding:5px 9px;border-radius:3px;outline:none;}
.beat-fi:focus{border-color:var(--acd);}
.ib{background:transparent;border:none;cursor:pointer;color:var(--txd);font-size:14px;padding:3px 5px;border-radius:3px;line-height:1;}
.ib:hover{color:var(--tx);background:var(--card2);}.ib.d:hover{color:var(--dg);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#1a1815;border:1px solid var(--bl);border-radius:8px;padding:20px;width:100%;max-width:510px;max-height:88vh;overflow-y:auto;}
.m-title{font-family:'IM Fell English',serif;font-size:21px;color:var(--txb);margin-bottom:16px;}
.m-foot{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--b);}
.empty{text-align:center;padding:45px 20px;}.empty-i{font-size:32px;opacity:.3;margin-bottom:9px;}
.empty-t{font-family:'IM Fell English',serif;font-size:17px;color:var(--txd);}.empty-s{font-size:13px;color:var(--txf);margin-top:5px;}
.no-proj{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:13px;text-align:center;padding:40px;}
.no-proj h2{font-family:'IM Fell English',serif;font-size:27px;color:var(--txd);}.no-proj p{color:var(--txf);max-width:300px;font-size:15px;}
.act-hdr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.12em;padding:4px 9px 5px;border-bottom:1px solid var(--b);margin-bottom:7px;margin-top:3px;}
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.ctx-bar{padding:6px 15px;background:var(--card);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ctx-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0;}.ctx-dot.off{background:var(--txf);}
.ctx-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.06em;}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:9px;}
.msg{max-width:82%;}.msg.u{align-self:flex-end;}.msg.a{align-self:flex-start;}
.bubble{padding:9px 13px;border-radius:8px;font-size:15px;line-height:1.7;}
.msg.u .bubble{background:var(--acg);border:1px solid var(--acd);color:var(--txb);border-radius:8px 8px 2px 8px;}
.msg.a .bubble{background:var(--card);border:1px solid var(--b);color:var(--tx);border-radius:8px 8px 8px 2px;}
.bubble p{margin-bottom:.35em;}.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--txb);}.bubble em{color:var(--ac);font-style:italic;}
.bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,.35);padding:1px 5px;border-radius:2px;color:var(--tl);}
.bubble h3{font-family:'IM Fell English',serif;font-size:16px;color:var(--ac);margin:7px 0 3px;}
.bubble li{margin-left:15px;margin-bottom:2px;}
.chat-bar{display:flex;gap:8px;padding:9px 16px;border-top:1px solid var(--b);background:var(--sb);flex-shrink:0;}
.chat-in{flex:1;background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:16px;padding:8px 12px;border-radius:6px;outline:none;resize:none;line-height:1.5;max-height:160px;}
.chat-in:focus{border-color:var(--acd);}.chat-in::placeholder{color:var(--txf);}
.send{background:var(--acg);border:1px solid var(--acd);color:var(--ac);width:40px;height:40px;border-radius:6px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;align-self:flex-end;flex-shrink:0;transition:all .14s;}
.send:hover:not(:disabled){background:rgba(196,146,42,.26);}.send:disabled{opacity:.35;cursor:not-allowed;}
.dots{display:flex;gap:4px;align-items:center;padding:9px 11px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--txd);animation:pulse 1.2s ease infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.25)}}
.rc-common{color:#8a8a8a;border-color:rgba(138,138,138,.4);}
.rc-uncommon{color:#5aaf6a;border-color:rgba(90,175,106,.4);}
.rc-rare{color:#4a82c4;border-color:rgba(74,130,196,.4);}
.rc-epic{color:#9b5adf;border-color:rgba(155,90,223,.4);}
.rc-legendary{color:#c4922a;border-color:rgba(196,146,42,.5);}
.rc-mythic{color:#c45a5a;border-color:rgba(196,90,90,.4);}
.sprev{background:rgba(7,6,5,.4);border:2px solid;border-radius:6px;padding:14px 16px;font-family:'JetBrains Mono',monospace;max-width:360px;min-width:240px;}
.sprev-type{font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;opacity:.65;}
.sprev-title{font-family:'IM Fell English',serif;font-size:19px;margin-bottom:3px;}
.sprev-sub{font-size:12px;opacity:.6;margin-bottom:8px;}
.sprev-div{height:1px;background:currentColor;opacity:.2;margin:8px 0;}
.sprev-field{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.sprev-label{opacity:.55;}.sprev-val{opacity:.9;}
.sprev-body{font-family:'Crimson Pro',serif;font-size:13px;line-height:1.6;margin-top:6px;opacity:.8;font-style:italic;}
.sprev-foot{font-size:9px;opacity:.4;margin-top:8px;text-align:right;letter-spacing:.07em;}
.tbl{width:100%;border-collapse:collapse;font-size:14px;}
.tbl th{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tl);padding:7px 9px;border-bottom:1px solid var(--b);text-align:left;}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--b);vertical-align:top;}
.tbl tr:hover td{background:var(--card);}
.idea-card{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 13px;margin-bottom:6px;transition:border-color .12s;}
.idea-card:hover{border-color:var(--bl);}
.idea-text{font-size:15px;color:var(--tx);line-height:1.65;white-space:pre-wrap;}
.idea-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.idea-time{font-family:'JetBrains Mono';font-size:10px;color:var(--txf);}
.itag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:1px solid;transition:all .12s;}
.itag.plot{color:#c4922a;border-color:rgba(196,146,42,.4);background:rgba(196,146,42,.08);}
.itag.character{color:#4a8a8c;border-color:rgba(74,138,140,.4);background:rgba(74,138,140,.08);}
.itag.mechanics{color:#9b5adf;border-color:rgba(155,90,223,.4);background:rgba(155,90,223,.08);}
.itag.world{color:#5aaf6a;border-color:rgba(90,175,106,.4);background:rgba(90,175,106,.08);}
.itag.scene{color:#c47a4a;border-color:rgba(196,122,74,.4);background:rgba(196,122,74,.08);}
.itag.other{color:var(--txd);border-color:var(--b);background:transparent;}
.frow{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:11px 13px;margin-bottom:6px;}
.frow.resolved{opacity:.55;}
.ftag{display:inline-block;font-size:10px;font-family:'JetBrains Mono';padding:1px 7px;border-radius:2px;text-transform:uppercase;letter-spacing:.07em;}
.ftag.p{background:rgba(74,138,140,.15);color:var(--tl);border:1px solid rgba(74,138,140,.35);}
.ftag.r{background:rgba(90,175,106,.12);color:#5aaf6a;border:1px solid rgba(90,175,106,.35);}
.gen-out{background:var(--card);border:1px solid var(--b);border-radius:5px;padding:14px;margin-top:14px;}
.gen-names{display:flex;flex-wrap:wrap;gap:7px;}
.gen-name{font-family:'IM Fell English',serif;font-size:17px;color:var(--txb);background:var(--card2);border:1px solid var(--b);padding:6px 13px;border-radius:4px;cursor:pointer;transition:all .13s;user-select:none;}
.gen-name:hover{border-color:var(--acd);color:var(--ac);}
.gen-name.cp{border-color:var(--ok);color:#5aaf6a;}
.beat-out-item{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--b);font-size:15px;color:var(--tx);line-height:1.6;}
.beat-out-item:last-child{border-bottom:none;}
.beat-num{font-family:'JetBrains Mono';font-size:11px;color:var(--ac);flex-shrink:0;width:18px;padding-top:2px;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--ac);color:#0d0c0a;font-family:'JetBrains Mono';font-size:11px;padding:7px 14px;border-radius:3px;z-index:999;animation:fadeToast 2s forwards;pointer-events:none;}
@keyframes fadeToast{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0}}
.scard{background:var(--card);border:1px solid var(--b);border-radius:5px;padding:10px 13px;margin-bottom:6px;cursor:pointer;transition:border-color .12s;}
.scard:hover{border-color:var(--bl);}.scard.on{border-color:var(--acd);background:var(--acg);}
.scard-name{font-size:15px;color:var(--txb);}.scard-sub{font-size:10px;font-family:'JetBrains Mono';color:var(--txd);text-transform:uppercase;margin-top:2px;letter-spacing:.05em;}
/* prompts */
.pcat-hdr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.12em;padding:4px 0 8px;margin-top:18px;border-bottom:1px solid var(--b);margin-bottom:10px;}
.pcat-hdr:first-child{margin-top:0;}
.pcard{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 13px;margin-bottom:5px;cursor:pointer;transition:all .13s;display:flex;align-items:flex-start;gap:10px;}
.pcard:hover{border-color:var(--acd);background:var(--acg);}
.pcard-text{font-size:14px;color:var(--tx);line-height:1.6;flex:1;}
.pcard-ico{font-size:13px;flex-shrink:0;padding-top:1px;opacity:.6;}
.qbtn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 9px;background:var(--tld);border:1px solid rgba(74,138,140,.35);color:var(--tl);border-radius:3px;cursor:pointer;white-space:nowrap;transition:all .12s;text-transform:uppercase;letter-spacing:.06em;}
.qbtn:hover{background:rgba(74,138,140,.28);border-color:var(--tl);}
.qbtns{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid var(--b);}
.rand-out{background:var(--card);border:1px solid var(--acd);border-radius:6px;padding:16px 18px;margin-top:14px;max-width:580px;}
.rand-prompt{font-family:'IM Fell English',serif;font-size:19px;color:var(--txb);line-height:1.5;margin-bottom:10px;}
/* word count */
.wc-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.wc-stat{background:var(--card);border:1px solid var(--b);border-radius:5px;padding:12px 14px;}
.wc-stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txd);margin-bottom:4px;}
.wc-stat-val{font-family:'IM Fell English',serif;font-size:26px;color:var(--txb);}
.wc-stat-sub{font-size:11px;color:var(--txf);margin-top:2px;}
.wc-row{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 13px;margin-bottom:5px;}
.wc-row-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.wc-row-title{font-size:15px;color:var(--txb);}
.wc-row-nums{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txd);}
.wc-bar-bg{height:4px;background:var(--card2);border-radius:2px;overflow:hidden;}
.wc-bar-fill{height:100%;border-radius:2px;transition:width .3s;}
.wc-over{color:var(--ac);}
/* consistency */
.cc-issue{background:var(--card);border-left:3px solid;border-radius:0 4px 4px 0;padding:11px 14px;margin-bottom:8px;}
.cc-issue.high{border-color:var(--dg);}
.cc-issue.med{border-color:var(--ac);}
.cc-issue.low{border-color:var(--tl);}
.cc-issue.ok{border-color:var(--ok);}
.cc-sev{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px;}
.cc-sev.high{color:var(--dg);}.cc-sev.med{color:var(--ac);}.cc-sev.low{color:var(--tl);}.cc-sev.ok{color:#5aaf6a;}
.cc-text{font-size:14px;color:var(--tx);line-height:1.65;}
/* export */
.exp-section{background:var(--card);border:1px solid var(--b);border-radius:5px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.exp-section-info{flex:1;}
.exp-section-name{font-size:15px;color:var(--txb);margin-bottom:2px;}
.exp-section-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);}
.exp-preview{background:var(--card2);border:1px solid var(--b);border-radius:4px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txd);line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-top:14px;}
/* chapter editor */
.ed-wrap{display:flex;flex:1;overflow:hidden;margin-top:11px;}
.ed-list{width:220px;border-right:1px solid var(--b);overflow-y:auto;padding:8px;flex-shrink:0;}
.ed-list-item{padding:8px 10px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .12s;margin-bottom:3px;position:relative;}
.ed-list-item:hover{background:var(--card);border-color:var(--b);}
.ed-list-item.on{background:var(--acg);border-color:var(--acd);}
.ed-list-title{font-size:14px;color:var(--txb);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ed-list-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
.ed-dot{width:5px;height:5px;border-radius:50%;background:var(--txf);flex-shrink:0;}
.ed-dot.has{background:#5aaf6a;}
.ed-list-wc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);}
.ed-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ed-toolbar{padding:8px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:9px;flex-shrink:0;background:var(--sb);}
.ed-toolbar-title{font-family:'IM Fell English',serif;font-size:16px;color:var(--txb);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ed-save-status{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;flex-shrink:0;}
.ed-save-status.saved{color:var(--ok);}
.ed-save-status.unsaved{color:var(--ac);}
.ed-save-status.saving{color:var(--txd);}
.ed-wc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);flex-shrink:0;}
.ed-textarea{flex:1;background:var(--bg);border:none;color:var(--txb);font-family:'Crimson Pro',Georgia,serif;font-size:17px;line-height:1.85;padding:28px 48px;resize:none;outline:none;overflow-y:auto;}
.ed-textarea::placeholder{color:var(--txf);}
.ed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--txd);}
.ed-empty-i{font-size:36px;opacity:.2;}
/* storage / backup */
.stor-bar-bg{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin:8px 0;}
.stor-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.bk-zone{border:2px dashed var(--b);border-radius:6px;padding:20px;text-align:center;cursor:pointer;transition:border-color .14s;}
.bk-zone:hover{border-color:var(--acd);}
.bk-zone-text{font-size:14px;color:var(--txd);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SK = 'scriptorium_v2';
const AK = 'scrip_apikey';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const getKey = () => localStorage.getItem(AK)||'';
const setKey = k => localStorage.setItem(AK, k.trim());
const defPd = () => ({world:[],characters:[],outline:[],screens:[],continuityFields:[],continuityLog:[],ideas:[],foreshadowing:[],wordCounts:[]});
const mergePd = pd => ({...defPd(),...pd});

function loadStore() {
  try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : {projects:[],cur:null,data:{}}; }
  catch { return {projects:[],cur:null,data:{}}; }
}
function saveStore(d, onFull) {
  try { localStorage.setItem(SK, JSON.stringify(d)); return true; }
  catch(e) { if(onFull) onFull(); return false; }
}

// Chapter prose stored separately to avoid the 5MB single-key limit
const chKey = (projId, chapId) => `scrip_ch_${projId}_${chapId}`;
function loadChapter(projId, chapId) {
  try { return localStorage.getItem(chKey(projId, chapId)) || ''; }
  catch { return ''; }
}
function saveChapter(projId, chapId, text) {
  try { localStorage.setItem(chKey(projId, chapId), text); return true; }
  catch { return false; }
}
function deleteChapter(projId, chapId) {
  try { localStorage.removeItem(chKey(projId, chapId)); } catch {}
}
function getAllChapterKeys() {
  const keys = [];
  try { for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith('scrip_ch_')) keys.push(k); } }
  catch {}
  return keys;
}
function storageUsedBytes() {
  let total = 0;
  try { for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k) total += k.length + (localStorage.getItem(k)||'').length; } }
  catch {}
  return total * 2; // UTF-16 ~2 bytes per char
}

function Toast({msg, onDone}) {
  useEffect(() => { const t = setTimeout(onDone, 2100); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

/* ── WORLD BIBLE ── */
function WorldBible({pd, onUpdate, onSendToAI}) {
  const entries = pd.world || [];
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const CATS = ['Mechanics','Magic System','Lore','Geography','Factions','History','Rules','Monsters','Items','Other'];
  const selE = sel && entries.find(e => e.id === sel.id);
  const open = e => { setForm(e ? {...e} : {title:'',category:'Mechanics',content:''}); setModal(true); };
  const save2 = () => {
    if (!form.title.trim()) return;
    const u = form.id ? entries.map(e => e.id===form.id ? form : e) : [...entries, {id:uid(),...form}];
    onUpdate({world:u}); if (form.id) setSel(form); setModal(false);
  };
  const del = id => { onUpdate({world:entries.filter(e=>e.id!==id)}); setSel(null); };
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="sec-hdr"><h1 className="sec-title">World <em>Bible</em></h1><button className="btn btn-a btn-sm" onClick={()=>open(null)}>+ Entry</button></div>
      <div className="two-panel">
        <div className="list-pane">
          {entries.length===0 && <div className="empty"><div className="empty-t" style={{fontSize:13}}>No entries yet</div><div className="empty-s">Mechanics, lore, rules...</div></div>}
          {entries.map(e => <div key={e.id} className={`li ${selE?.id===e.id?'on':''}`} onClick={()=>setSel(e)}><div className="li-title">{e.title}</div><div className="li-sub">{e.category}</div></div>)}
        </div>
        <div className="detail-pane">
          {!selE ? <div className="empty"><div className="empty-i">📜</div><div className="empty-t">Select an entry</div></div> : (<>
            <div className="det-row" style={{marginBottom:9}}>
              <div><div className="det-name">{selE.title}</div><div style={{marginTop:4}}><span className="tag t">{selE.category}</span></div></div>
              <div className="spacer"/>
              <button className="btn btn-g btn-sm" onClick={()=>open(selE)}>Edit</button>
              <button className="btn btn-d btn-sm" onClick={()=>del(selE.id)}>Delete</button>
            </div>
            <hr className="div"/><div className="det-body">{selE.content}</div>
            <div className="qbtns">
              <button className="qbtn" onClick={()=>onSendToAI(`Write a scene that demonstrates the "${selE.title}" mechanic in action — show it through character experience, not exposition.`)}>Show in scene</button>
              <button className="qbtn" onClick={()=>onSendToAI(`What are 3 ways the "${selE.title}" element could create unexpected conflict or complications for the protagonist?`)}>Complications</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Check my "${selE.title}" entry for internal consistency issues or gaps that might cause problems later in the story.`)}>Consistency check</button>
            </div>
          </>)}
        </div>
      </div>
      {modal && <div className="overlay" onClick={e=>e.target.className==='overlay'&&setModal(false)}><div className="modal">
        <div className="m-title">{form.id?'Edit Entry':'New Entry'}</div>
        <div className="fg"><label className="fl">Title</label><input className="fi" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
        <div className="fg"><label className="fl">Category</label><select className="fsel" value={form.category||'Mechanics'} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fg"><label className="fl">Content</label><textarea className="fta" style={{minHeight:180}} value={form.content||''} onChange={e=>setForm({...form,content:e.target.value})}/></div>
        <div className="m-foot"><button className="btn btn-g" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-a" onClick={save2}>Save</button></div>
      </div></div>}
    </div>
  );
}

/* ── CHARACTERS ── */
function Characters({pd, onUpdate, onSendToAI}) {
  const chars = pd.characters || [];
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [sk, setSk] = useState(''); const [sv, setSv] = useState('');
  const ROLES = ['Protagonist','Antagonist','Ally','Rival','Mentor','NPC','Monster','Other'];
  const selC = sel && chars.find(c => c.id===sel.id);
  const emptyF = () => ({title:'',role:'Protagonist',class:'',level:'',stats:{},traits:'',voice:'',background:'',notes:''});
  const open = c => { setForm(c ? {...c,stats:{...c.stats}} : emptyF()); setModal(true); };
  const save2 = () => {
    if (!form.title.trim()) return;
    const u = form.id ? chars.map(c=>c.id===form.id?form:c) : [...chars,{id:uid(),...form}];
    onUpdate({characters:u}); if (form.id) setSel(form); setModal(false);
  };
  const del = id => { onUpdate({characters:chars.filter(c=>c.id!==id)}); setSel(null); };
  const addStat = () => { if(!sk.trim()) return; setForm(f=>({...f,stats:{...f.stats,[sk.trim()]:sv}})); setSk(''); setSv(''); };
  const remStat = k => { const s={...form.stats}; delete s[k]; setForm(f=>({...f,stats:s})); };
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="sec-hdr"><h1 className="sec-title">Character <em>Registry</em></h1><button className="btn btn-a btn-sm" onClick={()=>open(null)}>+ Character</button></div>
      <div className="two-panel">
        <div className="list-pane">
          {chars.length===0 && <div className="empty"><div className="empty-t" style={{fontSize:13}}>No characters yet</div></div>}
          {chars.map(c => <div key={c.id} className={`li ${selC?.id===c.id?'on':''}`} onClick={()=>setSel(c)}><div className="li-title">{c.title}</div><div className="li-sub">{c.role}{c.class?` · ${c.class}`:''}{c.level?` · Lv${c.level}`:''}</div></div>)}
        </div>
        <div className="detail-pane">
          {!selC ? <div className="empty"><div className="empty-i">⚔</div><div className="empty-t">Select a character</div></div> : (<>
            <div className="det-row" style={{marginBottom:9}}>
              <div><div className="det-name">{selC.title}</div><div style={{marginTop:4}}><span className="tag a">{selC.role}</span>{selC.class&&<span className="tag t">{selC.class}</span>}{selC.level&&<span className="tag">Lv {selC.level}</span>}</div></div>
              <div className="spacer"/>
              <button className="btn btn-g btn-sm" onClick={()=>open(selC)}>Edit</button>
              <button className="btn btn-d btn-sm" onClick={()=>del(selC.id)}>Delete</button>
            </div>
            {Object.keys(selC.stats||{}).length>0 && <><div className="fl" style={{marginBottom:7}}>Stats</div><div className="stats-g">{Object.entries(selC.stats).map(([k,v])=><div key={k} className="stat-c"><div className="stat-n">{k}</div><div className="stat-v">{v}</div></div>)}</div></>}
            {selC.traits && <div style={{marginBottom:11}}><div className="fl">Traits</div><div className="det-body">{selC.traits}</div></div>}
            {selC.voice && <div style={{marginBottom:11}}><div className="fl">Voice & Tone</div><div className="det-body" style={{fontStyle:'italic'}}>{selC.voice}</div></div>}
            {selC.background && <div style={{marginBottom:11}}><div className="fl">Background</div><div className="det-body">{selC.background}</div></div>}
            {selC.notes && <div><div className="fl">Notes</div><div className="det-body" style={{color:'var(--txd)'}}>{selC.notes}</div></div>}
            <div className="qbtns">
              <button className="qbtn" onClick={()=>onSendToAI(`Write a scene from ${selC.title}'s point of view. Use their established voice and traits. Drop us in mid-action.`)}>POV scene</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Write a revealing piece of dialogue for ${selC.title}. Their voice should be distinct enough to identify without a dialogue tag.`)}>Dialogue sample</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Write a backstory scene for ${selC.title} — a specific memory that explains a present behaviour or belief.`)}>Backstory scene</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Write ${selC.title}'s internal monologue during a moment of high pressure. What do they tell themselves? What are they really afraid of?`)}>Inner monologue</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Write a scene that reveals ${selC.title}'s core flaw without stating it directly — only visible in what they avoid or how they deflect.`)}>Reveal flaw</button>
            </div>
          </>)}
        </div>
      </div>
      {modal && <div className="overlay" onClick={e=>e.target.className==='overlay'&&setModal(false)}><div className="modal">
        <div className="m-title">{form.id?'Edit Character':'New Character'}</div>
        <div className="f2">
          <div className="fg f-full"><label className="fl">Name</label><input className="fi" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
          <div className="fg"><label className="fl">Role</label><select className="fsel" value={form.role||'Protagonist'} onChange={e=>setForm({...form,role:e.target.value})}>{ROLES.map(r=><option key={r}>{r}</option>)}</select></div>
          <div className="fg"><label className="fl">Class / Title</label><input className="fi" value={form.class||''} onChange={e=>setForm({...form,class:e.target.value})}/></div>
          <div className="fg"><label className="fl">Level</label><input className="fi" value={form.level||''} onChange={e=>setForm({...form,level:e.target.value})}/></div>
        </div>
        <div className="fg"><label className="fl">Stats</label>
          <div style={{marginBottom:7}}>{Object.entries(form.stats||{}).map(([k,v])=><div key={k} style={{display:'flex',gap:7,alignItems:'center',marginBottom:3}}><span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'var(--tl)',flex:'0 0 110px'}}>{k}</span><span style={{fontSize:14,flex:1}}>{v}</span><button className="ib d" onClick={()=>remStat(k)}>✕</button></div>)}</div>
          <div className="i-row"><input className="fi" value={sk} onChange={e=>setSk(e.target.value)} placeholder="Name" style={{flex:'0 0 115px'}}/><input className="fi" value={sv} onChange={e=>setSv(e.target.value)} placeholder="Value" onKeyDown={e=>e.key==='Enter'&&addStat()}/><button className="btn btn-g btn-sm" onClick={addStat}>Add</button></div>
        </div>
        <div className="fg"><label className="fl">Traits / Personality</label><textarea className="fta" style={{minHeight:70}} value={form.traits||''} onChange={e=>setForm({...form,traits:e.target.value})}/></div>
        <div className="fg"><label className="fl">Voice & Dialogue Tone</label><textarea className="fta" style={{minHeight:70}} value={form.voice||''} onChange={e=>setForm({...form,voice:e.target.value})} placeholder="How they speak, internal register, what they notice..."/></div>
        <div className="fg"><label className="fl">Background</label><textarea className="fta" style={{minHeight:70}} value={form.background||''} onChange={e=>setForm({...form,background:e.target.value})}/></div>
        <div className="fg"><label className="fl">Notes</label><textarea className="fta" style={{minHeight:55}} value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
        <div className="m-foot"><button className="btn btn-g" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-a" onClick={save2}>Save</button></div>
      </div></div>}
    </div>
  );
}

/* ── OUTLINE ── */
function Outline({pd, onUpdate, onSendToAI}) {
  const chs = pd.outline || [];
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [nb, setNb] = useState('');
  const selCh = sel && chs.find(c=>c.id===sel.id);
  const open = c => { setForm(c ? {...c,beats:[...c.beats]} : {number:'',act:'1',title:'',beats:[],notes:''}); setModal(true); };
  const save2 = () => {
    if (!form.title.trim()) return;
    const u = form.id ? chs.map(c=>c.id===form.id?form:c) : [...chs,{id:uid(),...form}];
    onUpdate({outline:u}); if (form.id) setSel(form); setModal(false);
  };
  const del = id => { onUpdate({outline:chs.filter(c=>c.id!==id)}); setSel(null); };
  const addBeat = () => { if(!nb.trim()) return; setForm(f=>({...f,beats:[...f.beats,nb.trim()]})); setNb(''); };
  const acts = [...new Set(chs.map(c=>c.act))].sort();
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="sec-hdr"><h1 className="sec-title">Story <em>Outline</em></h1><button className="btn btn-a btn-sm" onClick={()=>open(null)}>+ Chapter</button></div>
      <div className="two-panel">
        <div className="list-pane">
          {chs.length===0 && <div className="empty"><div className="empty-t" style={{fontSize:13}}>No chapters yet</div></div>}
          {acts.map(act => <div key={act}><div className="act-hdr">Act {act}</div>{chs.filter(c=>c.act===act).sort((a,b)=>Number(a.number)-Number(b.number)).map(c=><div key={c.id} className={`li ${selCh?.id===c.id?'on':''}`} onClick={()=>setSel(c)}><div className="li-title">{c.number?`Ch.${c.number} · `:''}{c.title}</div><div className="li-sub">{c.beats.length} beat{c.beats.length!==1?'s':''}</div></div>)}</div>)}
        </div>
        <div className="detail-pane">
          {!selCh ? <div className="empty"><div className="empty-i">📋</div><div className="empty-t">Select a chapter</div></div> : (<>
            <div className="det-row" style={{marginBottom:9}}>
              <div><div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--tl)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:3}}>Act {selCh.act}{selCh.number?` · Chapter ${selCh.number}`:''}</div><div className="det-name">{selCh.title}</div></div>
              <div className="spacer"/>
              <button className="btn btn-g btn-sm" onClick={()=>open(selCh)}>Edit</button>
              <button className="btn btn-d btn-sm" onClick={()=>del(selCh.id)}>Delete</button>
            </div>
            {selCh.beats.length>0 && <><div className="fl" style={{marginBottom:7}}>Beats</div><div style={{marginBottom:12}}>{selCh.beats.map((b,i)=><div key={i} className="beat">{b}</div>)}</div></>}
            {selCh.notes && <div><div className="fl">Notes</div><div className="det-body" style={{fontStyle:'italic'}}>{selCh.notes}</div></div>}
            <div className="qbtns">
              <button className="qbtn" onClick={()=>onSendToAI(`Draft an opening scene for Chapter ${selCh.number||'?'}: "${selCh.title}". Beats: ${selCh.beats.join('; ')}. Start with immediate tension — no preamble.`)}>Draft opening</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Suggest 3 complications or twists that could make Chapter ${selCh.number||'?'}: "${selCh.title}" more surprising while staying true to the established beats.`)}>Complications</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Write the closing scene of Chapter ${selCh.number||'?'}: "${selCh.title}". End on a hook or shift that makes the next chapter inevitable.`)}>Draft ending</button>
              <button className="qbtn" onClick={()=>onSendToAI(`Analyse the pacing of Chapter ${selCh.number||'?'}: "${selCh.title}" based on these beats: ${selCh.beats.join('; ')}. What's the tension curve? Where might it sag?`)}>Pacing check</button>
            </div>
          </>)}
        </div>
      </div>
      {modal && <div className="overlay" onClick={e=>e.target.className==='overlay'&&setModal(false)}><div className="modal">
        <div className="m-title">{form.id?'Edit Chapter':'New Chapter'}</div>
        <div className="f2">
          <div className="fg"><label className="fl">Chapter #</label><input className="fi" value={form.number||''} onChange={e=>setForm({...form,number:e.target.value})}/></div>
          <div className="fg"><label className="fl">Act</label><select className="fsel" value={form.act||'1'} onChange={e=>setForm({...form,act:e.target.value})}>{['1','2','3','4','5'].map(a=><option key={a}>{a}</option>)}</select></div>
          <div className="fg f-full"><label className="fl">Title</label><input className="fi" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
        </div>
        <div className="fg"><label className="fl">Story Beats</label>
          {form.beats.map((b,i)=><div key={i} className="beat-row"><input className="beat-fi" value={b} onChange={e=>setForm(f=>({...f,beats:f.beats.map((x,j)=>j===i?e.target.value:x)}))}/><button className="ib d" onClick={()=>setForm(f=>({...f,beats:f.beats.filter((_,j)=>j!==i)}))}>✕</button></div>)}
          <div className="beat-row"><input className="beat-fi" value={nb} onChange={e=>setNb(e.target.value)} placeholder="Add a beat..." onKeyDown={e=>e.key==='Enter'&&addBeat()}/><button className="ib" style={{fontSize:18,color:'var(--ac)'}} onClick={addBeat}>+</button></div>
        </div>
        <div className="fg"><label className="fl">Notes</label><textarea className="fta" style={{minHeight:65}} value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
        <div className="m-foot"><button className="btn btn-g" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-a" onClick={save2}>Save</button></div>
      </div></div>}
    </div>
  );
}

/* ── SYSTEM SCREEN BUILDER ── */
const RARITIES = ['Common','Uncommon','Rare','Epic','Legendary','Mythic'];
const STYPES = ['Notification','Skill Acquired','Level Up','Stat Screen','Item Acquired','Warning','Achievement','System'];
const SICONS = {Notification:'⚡','Skill Acquired':'✦','Level Up':'▲','Stat Screen':'◈','Item Acquired':'◆',Warning:'⚠',Achievement:'★',System:'⊛'};
const rcClass = r => `rc-${r.toLowerCase()}`;
function buildText(s) {
  const sep = '─'.repeat(34); const ico = SICONS[s.type]||'◈';
  let t = `[ ${ico} ${s.type.toUpperCase()}${s.rarity?` · ${s.rarity.toUpperCase()}`:''} ]\n${sep}`;
  if(s.title) t += `\n  ${s.title}`;
  if(s.subtitle) t += `\n  ${s.subtitle}`;
  if((s.fields||[]).some(f=>f.label||f.value)) { t += `\n${sep}`; (s.fields||[]).filter(f=>f.label||f.value).forEach(f=>{ t += `\n  ${(f.label+'').padEnd(16)}${f.value}`; }); }
  if(s.body) { t += `\n${sep}\n  ${s.body.replace(/\n/g,'\n  ')}`; }
  if(s.footer) { t += `\n${sep}\n  ${s.footer}`; }
  t += `\n${sep}`; return t;
}

const TONES = ['Grimdark','Epic Fantasy','Cosmic Horror','Clinical/Technical','Mythic','Earthy/Grounded','Weird West'];
const ORIGINS = ['None','Nordic','Japanese','Indigenous/Apache','Latin','Arabic','Slavic','Celtic','Hebrew','Greek','Original'];
async function callClaude(system, prompt) {
  const key = getKey();
  if (!key) throw new Error('NO_KEY');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages:[{role:'user',content:prompt}]})
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.message||`API error ${r.status}`); }
  const d = await r.json(); return d.content?.find(b=>b.type==='text')?.text||'';
}
