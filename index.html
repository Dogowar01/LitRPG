<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scriptorium — LitRPG Writing Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0c0a;--sb:#100f0d;--card:#181613;--card2:#1e1c18;
  --b:#272320;--bl:#322e28;
  --ac:#c4922a;--acg:rgba(196,146,42,0.12);--acd:rgba(196,146,42,0.38);
  --tl:#4a8a8c;--tld:rgba(74,138,140,0.2);
  --tx:#cec3b0;--txd:#7a6e60;--txb:#ede5d4;--txf:#3e3830;
  --dg:#9b4040;--dgd:rgba(155,64,64,0.12);--ok:#4a7c5a;
}
html,body,#root{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--tx);font-size:16px;line-height:1.55;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px;}
.app{display:flex;flex-direction:column;height:100vh;}
.hdr{display:flex;align-items:center;gap:12px;padding:9px 16px;background:var(--sb);border-bottom:1px solid var(--b);flex-shrink:0;}
.hdr-logo{font-family:'IM Fell English',serif;font-size:19px;color:var(--ac);letter-spacing:.04em;flex-shrink:0;}
.hdr-logo span{font-size:11px;color:var(--txd);font-style:italic;margin-left:7px;}
.hdr-sep{width:1px;height:20px;background:var(--b);flex-shrink:0;}
.spacer{flex:1;}
.btn{font-family:'Crimson Pro',serif;font-size:13px;letter-spacing:.06em;padding:5px 12px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .14s;text-transform:uppercase;white-space:nowrap;}
.btn-a{background:var(--acg);border-color:var(--acd);color:var(--ac);}.btn-a:hover{background:rgba(196,146,42,.22);border-color:var(--ac);}
.btn-g{background:transparent;border-color:var(--b);color:var(--txd);}.btn-g:hover{border-color:var(--bl);color:var(--tx);}
.btn-d{background:var(--dgd);border-color:rgba(155,64,64,.38);color:var(--dg);}.btn-d:hover{background:rgba(155,64,64,.22);}
.btn-sm{padding:3px 9px;font-size:11px;}
.btn-t{background:var(--tld);border-color:rgba(74,138,140,.38);color:var(--tl);}.btn-t:hover{background:rgba(74,138,140,.28);}
.proj-sel{background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:15px;padding:5px 9px;border-radius:3px;outline:none;cursor:pointer;min-width:140px;max-width:210px;}
.proj-sel:focus{border-color:var(--acd);}.proj-sel option{background:var(--card);}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:52px;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:8px 0;gap:2px;align-items:center;flex-shrink:0;overflow-y:auto;}
.nav-btn{width:40px;height:40px;background:transparent;border:none;color:var(--txd);cursor:pointer;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;transition:all .12s;}
.nav-btn:hover{background:var(--card2);color:var(--tx);}.nav-btn.on{background:var(--acg);color:var(--ac);}
.nav-lbl{font-size:7.5px;font-family:'JetBrains Mono',monospace;margin-top:2px;letter-spacing:.06em;text-transform:uppercase;}
.nav-div{width:28px;height:1px;background:var(--b);margin:4px 0;flex-shrink:0;}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.sec-hdr{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sec-title{font-family:'IM Fell English',serif;font-size:23px;color:var(--txb);}
.sec-title em{color:var(--ac);font-style:normal;}
.two-panel{display:flex;flex:1;overflow:hidden;margin-top:11px;}
.list-pane{width:250px;border-right:1px solid var(--b);overflow-y:auto;padding:8px;flex-shrink:0;}
.detail-pane{flex:1;overflow-y:auto;padding:16px 20px;}
.full-pane{flex:1;overflow-y:auto;padding:16px 20px;}
.li{padding:8px 10px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .12s;margin-bottom:3px;}
.li:hover{background:var(--card);border-color:var(--b);}.li.on{background:var(--acg);border-color:var(--acd);}
.li-title{font-size:15px;color:var(--txb);}.li-sub{font-size:11px;color:var(--txd);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-top:2px;letter-spacing:.04em;}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;background:var(--card2);border:1px solid var(--b);border-radius:2px;color:var(--txd);text-transform:uppercase;letter-spacing:.07em;margin-right:4px;margin-bottom:3px;}
.tag.t{background:var(--tld);border-color:var(--tl);color:var(--tl);}.tag.a{background:var(--acg);border-color:var(--acd);color:var(--ac);}
.det-name{font-family:'IM Fell English',serif;font-size:25px;color:var(--txb);}
.det-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:12px;}
.det-body{font-size:15px;color:var(--tx);line-height:1.75;white-space:pre-wrap;}
hr.div{border:none;border-top:1px solid var(--b);margin:12px 0;}
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.stat-c{background:var(--card2);border:1px solid var(--b);border-radius:4px;padding:7px 9px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.07em;}
.stat-v{font-size:19px;font-family:'IM Fell English',serif;color:var(--txb);}
.beat{font-size:14px;color:var(--txd);padding:3px 0 3px 13px;position:relative;line-height:1.5;}
.beat::before{content:'◆';position:absolute;left:0;color:var(--acd);font-size:8px;top:6px;}
.fg{margin-bottom:12px;}.fl{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;}
.fi,.fsel,.fta{width:100%;background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:15px;padding:6px 10px;border-radius:4px;outline:none;transition:border-color .14s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--acd);}.fta{resize:vertical;min-height:100px;line-height:1.65;}.fsel option{background:var(--card);}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}.f-full{grid-column:1/-1;}
.i-row{display:flex;gap:6px;align-items:flex-end;}.i-row .fi{flex:1;}
.beat-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.beat-fi{flex:1;background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:14px;padding:5px 9px;border-radius:3px;outline:none;}
.beat-fi:focus{border-color:var(--acd);}
.ib{background:transparent;border:none;cursor:pointer;color:var(--txd);font-size:14px;padding:3px 5px;border-radius:3px;line-height:1;}
.ib:hover{color:var(--tx);background:var(--card2);}.ib.d:hover{color:var(--dg);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#1a1815;border:1px solid var(--bl);border-radius:8px;padding:20px;width:100%;max-width:510px;max-height:88vh;overflow-y:auto;}
.m-title{font-family:'IM Fell English',serif;font-size:21px;color:var(--txb);margin-bottom:16px;}
.m-foot{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--b);}
.empty{text-align:center;padding:45px 20px;}.empty-i{font-size:32px;opacity:.3;margin-bottom:9px;}
.empty-t{font-family:'IM Fell English',serif;font-size:17px;color:var(--txd);}.empty-s{font-size:13px;color:var(--txf);margin-top:5px;}
.no-proj{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:13px;text-align:center;padding:40px;}
.no-proj h2{font-family:'IM Fell English',serif;font-size:27px;color:var(--txd);}.no-proj p{color:var(--txf);max-width:300px;font-size:15px;}
.act-hdr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.12em;padding:4px 9px 5px;border-bottom:1px solid var(--b);margin-bottom:7px;margin-top:3px;}
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.ctx-bar{padding:6px 15px;background:var(--card);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ctx-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0;}.ctx-dot.off{background:var(--txf);}
.ctx-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.06em;}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:9px;}
.msg{max-width:82%;}.msg.u{align-self:flex-end;}.msg.a{align-self:flex-start;}
.bubble{padding:9px 13px;border-radius:8px;font-size:15px;line-height:1.7;}
.msg.u .bubble{background:var(--acg);border:1px solid var(--acd);color:var(--txb);border-radius:8px 8px 2px 8px;}
.msg.a .bubble{background:var(--card);border:1px solid var(--b);color:var(--tx);border-radius:8px 8px 8px 2px;}
.bubble p{margin-bottom:.35em;}.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--txb);}.bubble em{color:var(--ac);font-style:italic;}
.bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,.35);padding:1px 5px;border-radius:2px;color:var(--tl);}
.bubble h3{font-family:'IM Fell English',serif;font-size:16px;color:var(--ac);margin:7px 0 3px;}
.bubble li{margin-left:15px;margin-bottom:2px;}
.chat-bar{display:flex;gap:8px;padding:9px 16px;border-top:1px solid var(--b);background:var(--sb);flex-shrink:0;}
.chat-in{flex:1;background:var(--card);border:1px solid var(--b);color:var(--tx);font-family:'Crimson Pro',serif;font-size:16px;padding:8px 12px;border-radius:6px;outline:none;resize:none;line-height:1.5;max-height:160px;}
.chat-in:focus{border-color:var(--acd);}.chat-in::placeholder{color:var(--txf);}
.send{background:var(--acg);border:1px solid var(--acd);color:var(--ac);width:40px;height:40px;border-radius:6px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;align-self:flex-end;flex-shrink:0;transition:all .14s;}
.send:hover:not(:disabled){background:rgba(196,146,42,.26);}.send:disabled{opacity:.35;cursor:not-allowed;}
.dots{display:flex;gap:4px;align-items:center;padding:9px 11px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--txd);animation:pulse 1.2s ease infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.25)}}
.rc-common{color:#8a8a8a;border-color:rgba(138,138,138,.4);}
.rc-uncommon{color:#5aaf6a;border-color:rgba(90,175,106,.4);}
.rc-rare{color:#4a82c4;border-color:rgba(74,130,196,.4);}
.rc-epic{color:#9b5adf;border-color:rgba(155,90,223,.4);}
.rc-legendary{color:#c4922a;border-color:rgba(196,146,42,.5);}
.rc-mythic{color:#c45a5a;border-color:rgba(196,90,90,.4);}
.sprev{background:rgba(7,6,5,.4);border:2px solid;border-radius:6px;padding:14px 16px;font-family:'JetBrains Mono',monospace;max-width:360px;min-width:240px;}
.sprev-type{font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;opacity:.65;}
.sprev-title{font-family:'IM Fell English',serif;font-size:19px;margin-bottom:3px;}
.sprev-sub{font-size:12px;opacity:.6;margin-bottom:8px;}
.sprev-div{height:1px;background:currentColor;opacity:.2;margin:8px 0;}
.sprev-field{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.sprev-label{opacity:.55;}.sprev-val{opacity:.9;}
.sprev-body{font-family:'Crimson Pro',serif;font-size:13px;line-height:1.6;margin-top:6px;opacity:.8;font-style:italic;}
.sprev-foot{font-size:9px;opacity:.4;margin-top:8px;text-align:right;letter-spacing:.07em;}
.tbl{width:100%;border-collapse:collapse;font-size:14px;}
.tbl th{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tl);padding:7px 9px;border-bottom:1px solid var(--b);text-align:left;}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--b);vertical-align:top;}
.tbl tr:hover td{background:var(--card);}
.idea-card{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 13px;margin-bottom:6px;transition:border-color .12s;}
.idea-card:hover{border-color:var(--bl);}
.idea-text{font-size:15px;color:var(--tx);line-height:1.65;white-space:pre-wrap;}
.idea-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.idea-time{font-family:'JetBrains Mono';font-size:10px;color:var(--txf);}
.itag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:1px solid;transition:all .12s;}
.itag.plot{color:#c4922a;border-color:rgba(196,146,42,.4);background:rgba(196,146,42,.08);}
.itag.character{color:#4a8a8c;border-color:rgba(74,138,140,.4);background:rgba(74,138,140,.08);}
.itag.mechanics{color:#9b5adf;border-color:rgba(155,90,223,.4);background:rgba(155,90,223,.08);}
.itag.world{color:#5aaf6a;border-color:rgba(90,175,106,.4);background:rgba(90,175,106,.08);}
.itag.scene{color:#c47a4a;border-color:rgba(196,122,74,.4);background:rgba(196,122,74,.08);}
.itag.other{color:var(--txd);border-color:var(--b);background:transparent;}
.frow{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:11px 13px;margin-bottom:6px;}
.frow.resolved{opacity:.55;}
.ftag{display:inline-block;font-size:10px;font-family:'JetBrains Mono';padding:1px 7px;border-radius:2px;text-transform:uppercase;letter-spacing:.07em;}
.ftag.p{background:rgba(74,138,140,.15);color:var(--tl);border:1px solid rgba(74,138,140,.35);}
.ftag.r{background:rgba(90,175,106,.12);color:#5aaf6a;border:1px solid rgba(90,175,106,.35);}
.gen-out{background:var(--card);border:1px solid var(--b);border-radius:5px;padding:14px;margin-top:14px;}
.gen-names{display:flex;flex-wrap:wrap;gap:7px;}
.gen-name{font-family:'IM Fell English',serif;font-size:17px;color:var(--txb);background:var(--card2);border:1px solid var(--b);padding:6px 13px;border-radius:4px;cursor:pointer;transition:all .13s;user-select:none;}
.gen-name:hover{border-color:var(--acd);color:var(--ac);}
.gen-name.cp{border-color:var(--ok);color:#5aaf6a;}
.beat-out-item{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--b);font-size:15px;color:var(--tx);line-height:1.6;}
.beat-out-item:last-child{border-bottom:none;}
.beat-num{font-family:'JetBrains Mono';font-size:11px;color:var(--ac);flex-shrink:0;width:18px;padding-top:2px;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--ac);color:#0d0c0a;font-family:'JetBrains Mono';font-size:11px;padding:7px 14px;border-radius:3px;z-index:999;animation:fadeToast 2s forwards;pointer-events:none;}
@keyframes fadeToast{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0}}
.scard{background:var(--card);border:1px solid var(--b);border-radius:5px;padding:10px 13px;margin-bottom:6px;cursor:pointer;transition:border-color .12s;}
.scard:hover{border-color:var(--bl);}.scard.on{border-color:var(--acd);background:var(--acg);}
.scard-name{font-size:15px;color:var(--txb);}.scard-sub{font-size:10px;font-family:'JetBrains Mono';color:var(--txd);text-transform:uppercase;margin-top:2px;letter-spacing:.05em;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SK = 'scriptorium_v2';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const defPd = () => ({world:[],characters:[],outline:[],screens:[],continuityFields:[],continuityLog:[],ideas:[],foreshadowing:[]});
const mergePd = pd => ({...defPd(),...pd});

function loadStore() {
  try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : {projects:[],cur:null,data:{}}; }
  catch { return {projects:[],cur:null,data:{}}; }
}
function saveStore(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) { console.error(e); } }

function Toast({msg, onDone}) {
  useEffect(() => { const t = setTimeout(onDone, 2100); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

/* ── WORLD BIBLE ── */
function WorldBible({pd, onUpdate}) {
  const entries = pd.world || [];
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const CATS = ['Mechanics','Magic System','Lore','Geography','Factions','History','Rules','Monsters','Items','Other'];
  const selE = sel && entries.find(e => e.id === sel.id);
  const open = e => { setForm(e ? {...e} : {title:'',category:'Mechanics',content:''}); setModal(true); };
  const save2 = () => {
    if (!form.title.trim()) return;
    const u = form.id ? entries.map(e => e.id===form.id ? form : e) : [...entries, {id:uid(),...form}];
    onUpdate({world:u}); if (form.id) setSel(form); setModal(false);
  };
  const del = id => { onUpdate({world:entries.filter(e=>e.id!==id)}); setSel(null); };
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="sec-hdr"><h1 className="sec-title">World <em>Bible</em></h1><button className="btn btn-a btn-sm" onClick={()=>open(null)}>+ Entry</button></div>
      <div className="two-panel">
        <div className="list-pane">
          {entries.length===0 && <div className="empty"><div className="empty-t" style={{fontSize:13}}>No entries yet</div><div className="empty-s">Mechanics, lore, rules...</div></div>}
          {entries.map(e => <div key={e.id} className={`li ${selE?.id===e.id?'on':''}`} onClick={()=>setSel(e)}><div className="li-title">{e.title}</div><div className="li-sub">{e.category}</div></div>)}
        </div>
        <div className="detail-pane">
          {!selE ? <div className="empty"><div className="empty-i">📜</div><div className="empty-t">Select an entry</div></div> : (<>
            <div className="det-row" style={{marginBottom:9}}>
              <div><div className="det-name">{selE.title}</div><div style={{marginTop:4}}><span className="tag t">{selE.category}</span></div></div>
              <div className="spacer"/>
              <button className="btn btn-g btn-sm" onClick={()=>open(selE)}>Edit</button>
              <button className="btn btn-d btn-sm" onClick={()=>del(selE.id)}>Delete</button>
            </div>
            <hr className="div"/><div className="det-body">{selE.content}</div>
          </>)}
        </div>
      </div>
      {modal && <div className="overlay" onClick={e=>e.target.className==='overlay'&&setModal(false)}><div className="modal">
        <div className="m-title">{form.id?'Edit Entry':'New Entry'}</div>
        <div className="fg"><label className="fl">Title</label><input className="fi" value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
        <div className="fg"><label className="fl">Category</label><select className="fsel" value={form.category||'Mechanics'} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fg"><label className="fl">Content</label><textarea className="fta" style={{minHeight:180}} value={form.content||''} onChange={e=>setForm({...form,content:e.target.value})}/></div>
        <div className="m-foot"><button className="btn btn-g" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-a" onClick={save2}>Save</button></div>
      </div></div>}
    </div>
  );
}

/* ── CHARACTERS ── */
function Characters({pd, onUpdate}) {
  const chars = pd.characters || [];
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [sk, setSk] = useState(''); const [sv, setSv] = useState('');

/* ── SYSTEM SCREEN BUILDER ── */
const RARITIES = ['Common','Uncommon','Rare','Epic','Legendary','Mythic'];
const STYPES = ['Notification','Skill Acquired','Level Up','Stat Screen','Item Acquired','Warning','Achievement','System'];
const SICONS = {Notification:'⚡','Skill Acquired':'✦','Level Up':'▲','Stat Screen':'◈','Item Acquired':'◆',Warning:'⚠',Achievement:'★',System:'⊛'};
const rcClass = r => `rc-${r.toLowerCase()}`;
function buildText(s) {
  const sep = '─'.repeat(34); const ico = SICONS[s.type]||'◈';
  let t = `[ ${ico} ${s.type.toUpperCase()}${s.rarity?` · ${s.rarity.toUpperCase()}`:''} ]\n${sep}`;
  if(s.title) t += `\n  ${s.title}`;
  if(s.subtitle) t += `\n  ${s.subtitle}`;
  if((s.fields||[]).some(f=>f.label||f.value)) { t += `\n${sep}`; (s.fields||[]).filter(f=>f.label||f.value).forEach(f=>{ t += `\n  ${(f.label+'').padEnd(16)}${f.value}`; }); }
  if(s.body) { t += `\n${sep}\n  ${s.body.replace(/\n/g,'\n  ')}`; }
  if(s.footer) { t += `\n${sep}\n  ${s.footer}`; }
  t += `\n${sep}`; return t;
}
function SystemScreens({pd, onUpdate, toast}) {

  const [form, setForm] = useState(emptyF());
  const selS = sel && screens.find(s=>s.id===sel.id);
  const saveScreen = () => {
    if (!form.title.trim()) return;
    const id = form.id || uid();
    const entry = {...form, id};
    const u = form.id ? screens.map(s=>s.id===form.id?entry:s) : [...screens,entry];
    onUpdate({screens:u}); setSel(entry); setViewTab('library');
  };
  const loadScreen = s => { setSel(s); setForm({...s,fields:[...(s.fields||[{label:'',value:''}])]}); setViewTab('build'); };
  const del = id => { onUpdate({screens:screens.filter(s=>s.id!==id)}); setSel(null); setForm(emptyF()); };
  const newScreen = () => { setForm(emptyF()); setSel(null); setViewTab('build'); };
  const addField = () => setForm(f=>({...f,fields:[...f.fields,{label:'',value:''}]}));
  const upField = (i,k,v) => setForm(f=>({...f,fields:f.fields.map((x,j)=>j===i?{...x,[k]:v}:x)}));
  const remField = i => setForm(f=>({...f,fields:f.fields.filter((_,j)=>j!==i)}));

          <div className="fg"><label className="fl">Rarity</label><select className="fsel" value={form.rarity} onChange={e=>setForm({...form,rarity:e.target.value})}>{RARITIES.map(r=><option key={r}>{r}</option>)}</select></div>
          <div className="fg"><label className="fl">Title</label><input className="fi" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Shadow Step"/></div>
          <div className="fg"><label className="fl">Subtitle</label><input className="fi" value={form.subtitle} onChange={e=>setForm({...form,subtitle:e.target.value})} placeholder="e.g. Shadow Dancer Ability"/></div>
          <div className="fg"><label className="fl">Fields <button className="ib" style={{fontSize:15,color:'var(--ac)'}} onClick={addField}>+</button></label>
            {form.fields.map((f,i)=><div key={i} style={{display:'flex',gap:5,marginBottom:5}}><input className="fi" value={f.label} onChange={e=>upField(i,'label',e.target.value)} placeholder="Label" style={{flex:'0 0 100px'}}/><input className="fi" value={f.value} onChange={e=>upField(i,'value',e.target.value)} placeholder="Value"/><button className="ib d" onClick={()=>remField(i)}>✕</button></div>)}
          </div>
          <div className="fg"><label className="fl">Description / Flavour</label><textarea className="fta" style={{minHeight:75}} value={form.body} onChange={e=>setForm({...form,body:e.target.value})} placeholder="Flavour text or ability description..."/></div>

          <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--txd)',textTransform:'uppercase',letterSpacing:'.1em',alignSelf:'flex-start'}}>Live Preview</div>
          <div className={`sprev ${rc}`}>

            {(form.fields||[]).some(f=>f.label||f.value) && <><div className="sprev-div"/>{form.fields.filter(f=>f.label||f.value).map((f,i)=><div key={i} className="sprev-field"><span className="sprev-label">{f.label}</span><span className="sprev-val">{f.value}</span></div>)}</>}
            {form.body && <><div className="sprev-div"/><div className="sprev-body">{form.body}</div></>}
            {form.footer && <><div className="sprev-div"/><div className="sprev-foot">{form.footer}</div></>}

/* ── NAME GENERATOR ── */
const NAMETYPES = ['Character Name','Place Name','Skill Name','Chapter Title','Faction Name','Item Name','Technique Name'];
const TONES = ['Grimdark','Epic Fantasy','Cosmic Horror','Clinical/Technical','Mythic','Earthy/Grounded','Weird West'];
const ORIGINS = ['None','Nordic','Japanese','Indigenous/Apache','Latin','Arabic','Slavic','Celtic','Hebrew','Greek','Original'];
async function callClaude(system, prompt) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages:[{role:'user',content:prompt}]})});
  const d = await r.json(); return d.content?.find(b=>b.type==='text')?.text||'';
}
function NameGenerator({pd, projName}) {
  const chars = pd.characters||[]; const world = pd.world||[];
  const [type, setType] = useState('Character Name'); const [tone, setTone] = useState('Grimdark');
  const [origin, setOrigin] = useState('None'); const [count, setCount] = useState(8);
  const [extra, setExtra] = useState(''); const [results, setResults] = useState([]);
  const [busy, setBusy] = useState(false); const [copied, setCopied] = useState(null);
  const generate = async () => {
    setBusy(true); setResults([]);
    const sys = `You are a creative naming assistant for LitRPG fiction. Project: "${projName||'Untitled'}". ${world.length?`World: ${world.slice(0,3).map(e=>`${e.title}: ${e.content.slice(0,120)}`).join('; ')}`:''}${chars.length?` Characters: ${chars.map(c=>c.title).join(', ')}.`:''}`;
    const prompt = `Generate exactly ${count} ${type.toLowerCase()}s.\nTone: ${tone}\n${origin!=='None'?`Linguistic origin: ${origin}`:'Original/invented'}\n${extra?`Extra: ${extra}`:''}\nReturn ONLY the names, one per line. No numbering, no explanations.`;
    try {
      const txt = await callClaude(sys, prompt);
      const names = txt.split('\n').map(l=>l.trim().replace(/^[\-\*\d\.]+\s*/,'')).filter(l=>l.length>0&&l.length<60).slice(0,count);
      setResults(names);
    } catch(e) { setResults(['Error generating — try again']); }
    setBusy(false);

  const copy = (n,i) => { navigator.clipboard.writeText(n); setCopied(i); setTimeout(()=>setCopied(null),1500); };
  return (

          <div className="fg"><label className="fl">Count</label><select className="fsel" value={count} onChange={e=>setCount(Number(e.target.value))}>{[5,8,10,12,15].map(n=><option key={n}>{n}</option>)}</select></div>
          <div className="fg f-full"><label className="fl">Extra Notes (optional)</label><input className="fi" value={extra} onChange={e=>setExtra(e.target.value)} placeholder="e.g. two syllables, sounds ancient, related to shadow magic..."/></div>
        </div>
        <button className="btn btn-a" onClick={generate} disabled={busy} style={{marginBottom:6}}>{busy?'Generating...':'Generate Names'}</button>

function AIAssistant({projName, projDesc, pd}) {

    if(world.length){p+='\n=== WORLD BIBLE ===';world.forEach(e=>{p+=`\n[${e.category.toUpperCase()}] ${e.title}: ${e.content}`;});}

    if(outline.length){p+='\n\n=== OUTLINE ===';const acts=[...new Set(outline.map(c=>c.act))].sort();acts.forEach(a=>{p+=`\nAct ${a}:`;outline.filter(c=>c.act===a).sort((x,y)=>Number(x.number)-Number(y.number)).forEach(c=>{p+=`\n  Ch.${c.number||'?'} "${c.title}"`;if(c.beats.length)p+=` — ${c.beats.join(' | ')}`;});});}

      const d = await r.json(); const txt = d.content?.find(b=>b.type==='text')?.text||'(No response)';
      setMsgs(m=>[...m,{role:'assistant',content:txt}]);
    } catch { setMsgs(m=>[...m,{role:'assistant',content:'Connection error — please try again.'}]); }
    setBusy(false);
  };
  const renderMsg = t => {
    const lines=t.split('\n'); const els=[]; let li=null;
    lines.forEach((l,i)=>{
      const h3=l.match(/^###\s+(.+)/); const bul=l.match(/^[\*\-]\s+(.+)/); const num=l.match(/^\d+\.\s+(.+)/);
      if(h3){if(li){els.push(<ul key={`u${i}`} style={{paddingLeft:15,marginBottom:'0.4em'}}>{li}</ul>);li=null;}els.push(<h3 key={i}>{h3[1]}</h3>);}
      else if(bul||num){if(!li)li=[];li.push(<li key={i} dangerouslySetInnerHTML={{__html:fmt((bul||num)[1])}}/>);}
      else{if(li){els.push(<ul key={`u${i}`} style={{paddingLeft:15,marginBottom:'0.4em'}}>{li}</ul>);li=null;}if(l.trim())els.push(<p key={i} dangerouslySetInnerHTML={{__html:fmt(l)}}/>);else if(i<lines.length-1)els.push(<p key={i}>&nbsp;</p>);}
    });
    if(li)els.push(<ul key="ue" style={{paddingLeft:15,marginBottom:'0.4em'}}>{li}</ul>); return els;
  };
  const fmt = s => s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
  const SUGG = ['Draft the opening scene of chapter 1','Write a system notification for a skill unlock','Check for consistency issues in my mechanics','Suggest 5 plot complications for the next arc',"Write dialogue in my protagonist's voice"];
  return (
    <div className="chat-wrap">
      <div className="ctx-bar"><div className={`ctx-dot ${ctxCount>0?'':'off'}`}/><span className="ctx-txt">{ctxCount>0?`Context: ${world.length} lore · ${chars.length} chars · ${outline.length} chapters · ${foreshadow.filter(i=>!i.resolved).length} planted · ${log.length} log entries`:'No context loaded — fill in the other tabs first'}</span></div>
      <div className="msgs">
        {msgs.length===0 && <div style={{margin:'auto',textAlign:'center',padding:'28px 18px'}}>

          <div style={{fontFamily:"'IM Fell English',serif",fontSize:18,color:'var(--txd)',marginBottom:5}}>Your writing assistant</div>
          <div style={{fontSize:13,color:'var(--txf)',maxWidth:300,margin:'0 auto 20px'}}>Full project context loaded — draft scenes, check consistency, brainstorm arcs...</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center'}}>{SUGG.map((s,i)=><button key={i} onClick={()=>setInput(s)} style={{background:'var(--card)',border:'1px solid var(--b)',color:'var(--txd)',fontFamily:"'Crimson Pro',serif",fontSize:13,padding:'5px 11px',borderRadius:4,cursor:'pointer'}}>{s}</button>)}</div>
        </div>}
        {msgs.map((m,i)=><div key={i} className={`msg ${m.role==='user'?'u':'a'}`}><div className="bubble">{m.role==='user'?<p>{m.content}</p>:renderMsg(m.content)}</div></div>)}
        {busy && <div className="msg a"><div className="bubble"><div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div></div></div>}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-bar">
        <textarea className="chat-in" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),send())} placeholder="Draft a scene, check consistency, generate a system screen... (Enter to send)" rows={1}/>
        <button className="send" onClick={send} disabled={busy||!input.trim()}>↑</button>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
const TABS = [
  {id:'world',ico:'📜',lbl:'LORE',div:false},
  {id:'characters',ico:'⚔',lbl:'CHARS',div:false},
  {id:'outline',ico:'📋',lbl:'PLOT',div:true},
  {id:'log',ico:'📊',lbl:'LOG',div:false},
  {id:'foreshadow',ico:'🔮',lbl:'FORE',div:false},
  {id:'ideas',ico:'💡',lbl:'IDEAS',div:true},
  {id:'screens',ico:'🖥',lbl:'SCRN',div:false},
  {id:'names',ico:'🎲',lbl:'NAMES',div:false},
  {id:'scaffold',ico:'🏗',lbl:'SCAF',div:true},
  {id:'ai',ico:'✦',lbl:'AI',div:false},
];

function App() {
  const [app, setApp] = useState(null);
  const [tab, setTab] = useState('world');
  const [loading, setLoading] = useState(true);
  const [npModal, setNpModal] = useState(false);
  const [npForm, setNpForm] = useState({name:'',description:''});
  const [toast, setToast] = useState(null);

  useEffect(() => { const d = loadStore(); setApp(d); setLoading(false); }, []);

  const update = d => { setApp(d); saveStore(d); };
  const curProj = app?.projects.find(p=>p.id===app.cur);
  const curPd = mergePd(app?.data[app?.cur]||{});
  const updPd = patch => update({...app,data:{...app.data,[app.cur]:{...curPd,...patch}}});
  const createProj = () => {
    if(!npForm.name.trim()) return;
    const id = uid();
    update({...app,projects:[...app.projects,{id,...npForm}],cur:id,data:{...app.data,[id]:defPd()}});
    setNpModal(false); setNpForm({name:'',description:''});
  };
  const delProj = id => {
    const ps = app.projects.filter(p=>p.id!==id); const d={...app.data}; delete d[id];
    update({...app,projects:ps,cur:ps[0]?.id||null,data:d});
  };

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'IM Fell English',serif",color:'var(--txd)',fontSize:19}}>Loading Scriptorium...</div>;

  return (
    <div className="app">
      <div className="hdr">
        <div className="hdr-logo">SCRIPTORIUM <span>LitRPG Writing Studio</span></div>
        <div className="hdr-sep"/>
        {app.projects.length>0
          ? <select className="proj-sel" value={app.cur||''} onChange={e=>update({...app,cur:e.target.value})}>{app.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
          : <span style={{fontSize:13,color:'var(--txf)',fontStyle:'italic'}}>No projects</span>}
        <button className="btn btn-a btn-sm" onClick={()=>setNpModal(true)}>+ Project</button>
        {curProj && <button className="btn btn-d btn-sm" onClick={()=>{if(window.confirm(`Delete "${curProj.name}"?`))delProj(curProj.id);}}>✕</button>}
      </div>
      <div className="main">
        <div className="sidebar">
          {TABS.map(t => <React.Fragment key={t.id}>{t.div&&<div className="nav-div"/>}<button className={`nav-btn ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)} title={t.id}><span>{t.ico}</span><span className="nav-lbl">{t.lbl}</span></button></React.Fragment>)}
        </div>
        <div className="content">
          {!curProj
            ? <div className="no-proj"><h2>No Project Selected</h2><p>Create a project to begin. Each has its own lore, characters, outline, and tracking.</p><button className="btn btn-a" onClick={()=>setNpModal(true)}>Create Your First Project</button></div>
            : <>
                {tab==='world'       && <WorldBible        pd={curPd} onUpdate={updPd}/>}
                {tab==='characters'  && <Characters        pd={curPd} onUpdate={updPd}/>}
                {tab==='outline'     && <Outline           pd={curPd} onUpdate={updPd}/>}
                {tab==='screens'     && <SystemScreens     pd={curPd} onUpdate={updPd} toast={setToast}/>}
                {tab==='log'         && <ContinuityLog     pd={curPd} onUpdate={updPd}/>}
                {tab==='ideas'       && <IdeaCapture       pd={curPd} onUpdate={updPd}/>}
                {tab==='foreshadow'  && <ForeshadowTracker pd={curPd} onUpdate={updPd}/>}
                {tab==='names'       && <NameGenerator     pd={curPd} projName={curProj.name}/>}
                {tab==='scaffold'    && <SceneScaffold     pd={curPd} projName={curProj.name} projDesc={curProj.description}/>}
                {tab==='ai'          && <AIAssistant       projName={curProj.name} projDesc={curProj.description} pd={curPd}/>}
              </>}
        </div>
      </div>
      {npModal && <div className="overlay" onClick={e=>e.target.className==='overlay'&&setNpModal(false)}><div className="modal">
        <div className="m-title">New Project</div>
        <div className="fg"><label className="fl">Project Name</label><input className="fi" value={npForm.name} onChange={e=>setNpForm({...npForm,name:e.target.value})} placeholder="e.g. Blood Markers" autoFocus onKeyDown={e=>e.key==='Enter'&&createProj()}/></div>
        <div className="fg"><label className="fl">Short Description (optional)</label><textarea className="fta" style={{minHeight:75}} value={npForm.description} onChange={e=>setNpForm({...npForm,description:e.target.value})} placeholder="Tone, setting, protagonist... the AI uses this as context."/></div>
        <div className="m-foot"><button className="btn btn-g" onClick={()=>setNpModal(false)}>Cancel</button><button className="btn btn-a" onClick={createProj}>Create</button></div>
      </div></div>}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
